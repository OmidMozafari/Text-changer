<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <textarea name="textarea" id="textArea" placeholder="Write something here..."></textarea>

    <div id="buttonContainer">
        <button id="UpperCasing"> TO UPPER CASE</button>
        <button id="LowerCasing">to lower case</button>
        <button id="Capitalizing"> To Capitalize</button>
        <button id="deleteSpaces">Delete additional spaces</button>
        <button id="wordCounter">Count Words</button>
        <button id="charcterCounter">Count Charcters</button>
        <button id="reverseWords"> Reverse words</button>
    </div>
    <div id="countersContainer">
        <div id="firstCounterDiv" class="counterDivs">
            <p id="firstCounterPara"></p>
            <p>Words.</p>
        </div>
        <div id="secondCounterDiv" class="counterDivs">
            <p id="secondCounterPara"></p>
            <p>Charcters.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
